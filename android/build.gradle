// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:9.0.0'
        classpath 'com.google.gms:google-services:4.4.2'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Temporary fix for https://github.com/ionic-team/capacitor/issues/7269
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android.buildTypes.release {
                if (proguardFiles.contains(project.file("proguard-android.txt"))) {
                    proguardFiles.remove(project.file("proguard-android.txt"))
                    proguardFiles.add(project.file("proguard-android-optimize.txt"))
                }
            }
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
